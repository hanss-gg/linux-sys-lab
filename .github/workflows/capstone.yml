name: Capstone CI

on:
  push:
    paths:
      - 'capstone/**'
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: capstone/app
        run: npm install

      - name: Run tests
        working-directory: capstone/app
        run: npm test

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t file-uploader:latest capstone/app

      - name: Verify image
        run: docker images file-uploader
